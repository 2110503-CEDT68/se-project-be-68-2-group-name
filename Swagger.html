<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoworkingSpace API — Swagger UI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui.min.css" />
  <style>
    body { margin: 0; background: #fafafa; }
    .swagger-ui .topbar { background: #1a1a2e; }
    .swagger-ui .topbar .download-url-wrapper { display: none; }
  </style>
</head>
<body>
<div id="swagger-ui"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui-bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui-standalone-preset.min.js"></script>
<script>
const spec = {
  openapi: "3.0.3",
  info: {
    title: "CoworkingSpace API",
    version: "1.0.0",
    description: "REST API for the CoworkingSpace reservation platform.\n\n## Authentication\nMost protected routes require a **Bearer JWT** token obtained from `/api/v1/auth/login` or `/api/v1/auth/register`.\n\nClick **Authorize** and paste your token in the form `Bearer <token>`.\n\n## Roles\n| Role | Permissions |\n|------|-------------|\n| `user` | Own reservations · Own comments · Reactions · Custom emojis |\n| `admin` | Everything above + manage all data, block users |"
  },
  servers: [
    { url: "http://localhost:5000/api/v1", description: "Local development" },
    { url: "https://your-production-url.vercel.app/api/v1", description: "Production (Vercel)" }
  ],
  components: {
    securitySchemes: {
      bearerAuth: {
        type: "http",
        scheme: "bearer",
        bearerFormat: "JWT"
      }
    },
    schemas: {
      User: {
        type: "object",
        properties: {
          _id:       { type: "string", example: "663f1a2b3c4d5e6f7a8b9c0d" },
          name:      { type: "string", example: "Jane Doe" },
          email:     { type: "string", format: "email", example: "jane@example.com" },
          tel:       { type: "string", example: "0812345678" },
          role:      { type: "string", enum: ["user","admin"], example: "user" },
          isBlocked: { type: "boolean", example: false },
          createdAt: { type: "string", format: "date-time" }
        }
      },
      RegisterInput: {
        type: "object",
        required: ["name","email","tel","password"],
        properties: {
          name:     { type: "string", example: "Jane Doe" },
          email:    { type: "string", format: "email", example: "jane@example.com" },
          tel:      { type: "string", example: "0812345678" },
          password: { type: "string", minLength: 6, example: "secret123" },
          role:     { type: "string", enum: ["user","admin"], default: "user" }
        }
      },
      LoginInput: {
        type: "object",
        required: ["email","password"],
        properties: {
          email:    { type: "string", format: "email", example: "jane@example.com" },
          password: { type: "string", example: "secret123" }
        }
      },
      AuthResponse: {
        type: "object",
        properties: {
          success: { type: "boolean", example: true },
          token:   { type: "string", example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." }
        }
      },
      CoworkingSpace: {
        type: "object",
        properties: {
          _id:             { type: "string", example: "663f1a2b3c4d5e6f7a8b9c0e" },
          name:            { type: "string", example: "The Hub Bangkok" },
          address:         { type: "string", example: "99 Sukhumvit Rd, Bangkok" },
          tel:             { type: "string", example: "0212345678" },
          openCloseTime:   { type: "string", example: "08:00-22:00" },
          description:     { type: "string", example: "A vibrant co-working space in the heart of Bangkok." },
          imageUrl:        { type: "string", example: "https://example.com/hub.jpg" },
          price:           { type: "string", example: "500" },
          averageRating:   { type: "number", example: 4.5 },
          ratingsQuantity: { type: "number", example: 12 }
        }
      },
      CoworkingSpaceInput: {
        type: "object",
        required: ["name","address","tel","openCloseTime","description","imageUrl","price"],
        properties: {
          name:          { type: "string", maxLength: 50, example: "The Hub Bangkok" },
          address:       { type: "string", example: "99 Sukhumvit Rd, Bangkok" },
          tel:           { type: "string", example: "0212345678" },
          openCloseTime: { type: "string", example: "08:00-22:00" },
          description:   { type: "string", example: "A vibrant co-working space." },
          imageUrl:      { type: "string", example: "https://example.com/hub.jpg" },
          price:         { type: "string", example: "500" }
        }
      },
      Reservation: {
        type: "object",
        properties: {
          _id:            { type: "string", example: "663f1a2b3c4d5e6f7a8b9c0f" },
          resvDate:       { type: "string", format: "date-time", example: "2025-12-01T09:00:00.000Z" },
          user:           { type: "string", example: "663f1a2b3c4d5e6f7a8b9c0d" },
          coworkingSpace: { type: "string", example: "663f1a2b3c4d5e6f7a8b9c0e" },
          capacity:       { type: "integer", example: 2 },
          totalCost:      { type: "number", example: 1000 },
          createdAt:      { type: "string", format: "date-time" }
        }
      },
      ReservationInput: {
        type: "object",
        required: ["resvDate","capacity","totalCost"],
        properties: {
          resvDate:  { type: "string", format: "date-time", example: "2025-12-01T09:00:00.000Z" },
          capacity:  { type: "integer", minimum: 1, example: 2 },
          totalCost: { type: "number", example: 1000 }
        }
      },
      Comment: {
        type: "object",
        properties: {
          _id:            { type: "string" },
          message:        { type: "string", example: "Amazing place!" },
          rating:         { type: "integer", minimum: 1, maximum: 5, example: 5 },
          coworkingSpace: { type: "string" },
          user:           { $ref: "#/components/schemas/User" },
          reportCount:    { type: "integer", example: 0 },
          reportStatus:   { type: "string", enum: ["clean","reported"], example: "clean" },
          createdAt:      { type: "string", format: "date-time" }
        }
      },
      CommentInput: {
        type: "object",
        required: ["message","rating"],
        properties: {
          message: { type: "string", maxLength: 500, example: "Amazing place!" },
          rating:  { type: "integer", minimum: 1, maximum: 5, example: 5 }
        }
      },
      Reaction: {
        type: "object",
        properties: {
          _id:         { type: "string" },
          comment:     { type: "string" },
          user:        { $ref: "#/components/schemas/User" },
          emojiType:   { type: "string", enum: ["default","custom"] },
          emojiValue:  { type: "string", example: "👍" },
          customEmoji: { type: "string", nullable: true },
          status:      { type: "string", enum: ["active","disabled"] },
          createdAt:   { type: "string", format: "date-time" }
        }
      },
      ReactionInput: {
        type: "object",
        required: ["emojiType","emojiValue"],
        properties: {
          emojiType:   { type: "string", enum: ["default","custom"], example: "default" },
          emojiValue:  { type: "string", example: "👍" },
          customEmoji: { type: "string", description: "Required when emojiType is 'custom'", example: "663f1a2b3c4d5e6f7a8b9c11" }
        }
      },
      CustomEmoji: {
        type: "object",
        properties: {
          _id:       { type: "string" },
          name:      { type: "string", example: "my-cool-emoji" },
          imageUrl:  { type: "string", example: "https://res.cloudinary.com/demo/image/upload/custom-emojis/abc.png" },
          publicId:  { type: "string", example: "custom-emojis/abc" },
          width:     { type: "integer", example: 64 },
          height:    { type: "integer", example: 64 },
          user:      { type: "string" },
          status:    { type: "string", enum: ["active","disabled"] },
          createdAt: { type: "string", format: "date-time" }
        }
      },
      SuccessResponse: {
        type: "object",
        properties: {
          success: { type: "boolean", example: true },
          data:    { type: "object" }
        }
      },
      ListResponse: {
        type: "object",
        properties: {
          success: { type: "boolean", example: true },
          count:   { type: "integer", example: 5 },
          data:    { type: "array", items: { type: "object" } }
        }
      },
      ErrorResponse: {
        type: "object",
        properties: {
          success: { type: "boolean", example: false },
          message: { type: "string", example: "Error description" }
        }
      }
    }
  },
  security: [],
  tags: [
    { name: "Auth",            description: "Registration, login, profile" },
    { name: "CoworkingSpaces", description: "Manage co-working space listings" },
    { name: "Reservations",    description: "Book and manage reservations" },
    { name: "Comments",        description: "Reviews and ratings for spaces" },
    { name: "Reactions",       description: "Emoji reactions on comments" },
    { name: "CustomEmojis",    description: "Upload and manage custom emoji images" }
  ],
  paths: {

    // ─── AUTH ────────────────────────────────────────────────────────────────
    "/auth/register": {
      post: {
        tags: ["Auth"],
        summary: "Register a new user",
        operationId: "register",
        requestBody: {
          required: true,
          content: { "application/json": { schema: { $ref: "#/components/schemas/RegisterInput" } } }
        },
        responses: {
          "200": { description: "User created — token returned", content: { "application/json": { schema: { $ref: "#/components/schemas/AuthResponse" } } } },
          "400": { description: "Validation error / duplicate email", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
        }
      }
    },
    "/auth/login": {
      post: {
        tags: ["Auth"],
        summary: "Login with email & password",
        operationId: "login",
        requestBody: {
          required: true,
          content: { "application/json": { schema: { $ref: "#/components/schemas/LoginInput" } } }
        },
        responses: {
          "200": { description: "Login successful", content: { "application/json": { schema: { $ref: "#/components/schemas/AuthResponse" } } } },
          "400": { description: "Missing credentials or user not found", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrorResponse" } } } },
          "401": { description: "Wrong password", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
        }
      }
    },
    "/auth/logout": {
      get: {
        tags: ["Auth"],
        summary: "Logout (clears cookie)",
        operationId: "logout",
        responses: {
          "200": { description: "Logged out", content: { "application/json": { schema: { $ref: "#/components/schemas/SuccessResponse" } } } }
        }
      }
    },
    "/auth/me": {
      get: {
        tags: ["Auth"],
        summary: "Get current logged-in user",
        operationId: "getMe",
        security: [{ bearerAuth: [] }],
        responses: {
          "200": { description: "Current user profile", content: { "application/json": { schema: { allOf: [{ $ref: "#/components/schemas/SuccessResponse" }, { properties: { data: { $ref: "#/components/schemas/User" } } }] } } } },
          "401": { description: "Unauthorized", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
        }
      }
    },
    "/auth/users/{userId}/block": {
      put: {
        tags: ["Auth"],
        summary: "Block a user account (admin only)",
        operationId: "blockUser",
        security: [{ bearerAuth: [] }],
        parameters: [{ name: "userId", in: "path", required: true, schema: { type: "string" }, description: "ID of the user to block" }],
        responses: {
          "200": { description: "User blocked", content: { "application/json": { schema: { $ref: "#/components/schemas/SuccessResponse" } } } },
          "400": { description: "Cannot block an admin", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrorResponse" } } } },
          "401": { description: "Unauthorized", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrorResponse" } } } },
          "403": { description: "Forbidden — admin only", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrorResponse" } } } },
          "404": { description: "User not found", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
        }
      }
    },
    "/auth/users/{userId}/unblock": {
      put: {
        tags: ["Auth"],
        summary: "Unblock a user account (admin only)",
        operationId: "unblockUser",
        security: [{ bearerAuth: [] }],
        parameters: [{ name: "userId", in: "path", required: true, schema: { type: "string" }, description: "ID of the user to unblock" }],
        responses: {
          "200": { description: "User unblocked", content: { "application/json": { schema: { $ref: "#/components/schemas/SuccessResponse" } } } },
          "401": { description: "Unauthorized", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrorResponse" } } } },
          "403": { description: "Forbidden — admin only", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrorResponse" } } } },
          "404": { description: "User not found", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
        }
      }
    },

    // ─── COWORKING SPACES ────────────────────────────────────────────────────
    "/coworkingspaces": {
      get: {
        tags: ["CoworkingSpaces"],
        summary: "Get all coworking spaces",
        operationId: "getCoworkingSpaces",
        parameters: [
          { name: "select",  in: "query", schema: { type: "string" }, description: "Comma-separated fields to return, e.g. `name,address`" },
          { name: "sort",    in: "query", schema: { type: "string" }, description: "Sort field(s), prefix `-` for descending, e.g. `-averageRating`" },
          { name: "page",    in: "query", schema: { type: "integer", default: 1 } },
          { name: "limit",   in: "query", schema: { type: "integer", default: 25 } },
          { name: "price",   in: "query", schema: { type: "string" }, description: "Filter by price (supports operators: `gt`, `gte`, `lt`, `lte`)" }
        ],
        responses: {
          "200": {
            description: "List of coworking spaces",
            content: {
              "application/json": {
                schema: { allOf: [{ $ref: "#/components/schemas/ListResponse" }, { properties: { data: { type: "array", items: { $ref: "#/components/schemas/CoworkingSpace" } } } }] }
              }
            }
          },
          "400": { description: "Bad request", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
        }
      },
      post: {
        tags: ["CoworkingSpaces"],
        summary: "Create a coworking space (admin only)",
        operationId: "createCoworkingSpace",
        security: [{ bearerAuth: [] }],
        requestBody: {
          required: true,
          content: { "application/json": { schema: { $ref: "#/components/schemas/CoworkingSpaceInput" } } }
        },
        responses: {
          "201": { description: "Created", content: { "application/json": { schema: { allOf: [{ $ref: "#/components/schemas/SuccessResponse" }, { properties: { data: { $ref: "#/components/schemas/CoworkingSpace" } } }] } } } },
          "401": { description: "Unauthorized" },
          "403": { description: "Forbidden — admin only" }
        }
      }
    },
    "/coworkingspaces/{id}": {
      get: {
        tags: ["CoworkingSpaces"],
        summary: "Get a single coworking space",
        operationId: "getCoworkingSpace",
        parameters: [{ name: "id", in: "path", required: true, schema: { type: "string" } }],
        responses: {
          "200": { description: "Coworking space", content: { "application/json": { schema: { allOf: [{ $ref: "#/components/schemas/SuccessResponse" }, { properties: { data: { $ref: "#/components/schemas/CoworkingSpace" } } }] } } } },
          "400": { description: "Not found / bad ID" }
        }
      },
      put: {
        tags: ["CoworkingSpaces"],
        summary: "Update a coworking space (admin only)",
        operationId: "updateCoworkingSpace",
        security: [{ bearerAuth: [] }],
        parameters: [{ name: "id", in: "path", required: true, schema: { type: "string" } }],
        requestBody: {
          required: true,
          content: { "application/json": { schema: { $ref: "#/components/schemas/CoworkingSpaceInput" } } }
        },
        responses: {
          "200": { description: "Updated" },
          "401": { description: "Unauthorized" },
          "403": { description: "Forbidden" },
          "404": { description: "Not found" }
        }
      },
      delete: {
        tags: ["CoworkingSpaces"],
        summary: "Delete a coworking space — cascades reservations (admin only)",
        operationId: "deleteCoworkingSpace",
        security: [{ bearerAuth: [] }],
        parameters: [{ name: "id", in: "path", required: true, schema: { type: "string" } }],
        responses: {
          "200": { description: "Deleted" },
          "401": { description: "Unauthorized" },
          "403": { description: "Forbidden" },
          "404": { description: "Not found" }
        }
      }
    },

    // ─── RESERVATIONS (nested + standalone) ──────────────────────────────────
    "/coworkingspaces/{coworkingSpaceId}/reservations": {
      post: {
        tags: ["Reservations"],
        summary: "Create a reservation for a coworking space",
        operationId: "addReservation",
        security: [{ bearerAuth: [] }],
        parameters: [{ name: "coworkingSpaceId", in: "path", required: true, schema: { type: "string" } }],
        requestBody: {
          required: true,
          content: { "application/json": { schema: { $ref: "#/components/schemas/ReservationInput" } } }
        },
        responses: {
          "201": { description: "Reservation created", content: { "application/json": { schema: { allOf: [{ $ref: "#/components/schemas/SuccessResponse" }, { properties: { data: { $ref: "#/components/schemas/Reservation" } } }] } } } },
          "400": { description: "Limit reached (max 3 for non-admin) / bad input", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrorResponse" } } } },
          "404": { description: "Coworking space not found", content: { "application/json": { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
        }
      }
    },
    "/reservations": {
      get: {
        tags: ["Reservations"],
        summary: "Get reservations (own for user, all for admin)",
        operationId: "getReservations",
        security: [{ bearerAuth: [] }],
        responses: {
          "200": {
            description: "List of reservations",
            content: { "application/json": { schema: { allOf: [{ $ref: "#/components/schemas/ListResponse" }, { properties: { data: { type: "array", items: { $ref: "#/components/schemas/Reservation" } } } }] } } }
          },
          "500": { description: "Server error" }
        }
      }
    },
    "/reservations/{id}": {
      get: {
        tags: ["Reservations"],
        summary: "Get a single reservation (owner or admin)",
        operationId: "getReservation",
        security: [{ bearerAuth: [] }],
        parameters: [{ name: "id", in: "path", required: true, schema: { type: "string" } }],
        responses: {
          "200": { description: "Reservation data", content: { "application/json": { schema: { allOf: [{ $ref: "#/components/schemas/SuccessResponse" }, { properties: { data: { $ref: "#/components/schemas/Reservation" } } }] } } } },
          "401": { description: "Not the owner" },
          "404": { description: "Not found" }
        }
      },
      put: {
        tags: ["Reservations"],
        summary: "Update a reservation (owner or admin)",
        operationId: "updateReservation",
        security: [{ bearerAuth: [] }],
        parameters: [{ name: "id", in: "path", required: true, schema: { type: "string" } }],
        requestBody: {
          required: true,
          content: { "application/json": { schema: { $ref: "#/components/schemas/ReservationInput" } } }
        },
        responses: {
          "200": { description: "Updated" },
          "401": { description: "Not the owner" },
          "404": { description: "Not found" }
        }
      },
      delete: {
        tags: ["Reservations"],
        summary: "Delete a reservation (owner or admin)",
        operationId: "deleteReservation",
        security: [{ bearerAuth: [] }],
        parameters: [{ name: "id", in: "path", required: true, schema: { type: "string" } }],
        responses: {
          "200": { description: "Deleted" },
          "401": { description: "Not the owner" },
          "404": { description: "Not found" }
        }
      }
    },

    // ─── COMMENTS ────────────────────────────────────────────────────────────
    "/coworkingspaces/{coworkingSpaceId}/comments": {
      get: {
        tags: ["Comments"],
        summary: "Get all comments for a coworking space",
        operationId: "getCommentsBySpace",
        parameters: [{ name: "coworkingSpaceId", in: "path", required: true, schema: { type: "string" } }],
        responses: {
          "200": { description: "List of comments", content: { "application/json": { schema: { allOf: [{ $ref: "#/components/schemas/ListResponse" }, { properties: { data: { type: "array", items: { $ref: "#/components/schemas/Comment" } } } }] } } } }
        }
      },
      post: {
        tags: ["Comments"],
        summary: "Add a comment / review to a coworking space",
        operationId: "addComment",
        security: [{ bearerAuth: [] }],
        parameters: [{ name: "coworkingSpaceId", in: "path", required: true, schema: { type: "string" } }],
        requestBody: {
          required: true,
          content: { "application/json": { schema: { $ref: "#/components/schemas/CommentInput" } } }
        },
        responses: {
          "201": { description: "Comment created — averageRating updated", content: { "application/json": { schema: { allOf: [{ $ref: "#/components/schemas/SuccessResponse" }, { properties: { data: { $ref: "#/components/schemas/Comment" } } }] } } } },
          "400": { description: "Missing space ID" },
          "403": { description: "User is blocked" },
          "404": { description: "Coworking space not found" }
        }
      }
    },
    "/comments": {
      get: {
        tags: ["Comments"],
        summary: "Get all comments (admin view)",
        operationId: "getAllComments",
        responses: {
          "200": { description: "All comments", content: { "application/json": { schema: { $ref: "#/components/schemas/ListResponse" } } } }
        }
      }
    },
    "/comments/{id}": {
      get: {
        tags: ["Comments"],
        summary: "Get a single comment by ID",
        operationId: "getComment",
        parameters: [{ name: "id", in: "path", required: true, schema: { type: "string" } }],
        responses: {
          "200": { description: "Comment", content: { "application/json": { schema: { allOf: [{ $ref: "#/components/schemas/SuccessResponse" }, { properties: { data: { $ref: "#/components/schemas/Comment" } } }] } } } },
          "404": { description: "Not found" }
        }
      },
      put: {
        tags: ["Comments"],
        summary: "Update a comment (owner or admin)",
        operationId: "updateComment",
        security: [{ bearerAuth: [] }],
        parameters: [{ name: "id", in: "path", required: true, schema: { type: "string" } }],
        requestBody: {
          required: true,
          content: { "application/json": { schema: { $ref: "#/components/schemas/CommentInput" } } }
        },
        responses: {
          "200": { description: "Updated — averageRating recalculated" },
          "401": { description: "Not the owner" },
          "404": { description: "Not found" }
        }
      },
      delete: {
        tags: ["Comments"],
        summary: "Delete a comment (owner or admin)",
        operationId: "deleteComment",
        security: [{ bearerAuth: [] }],
        parameters: [{ name: "id", in: "path", required: true, schema: { type: "string" } }],
        responses: {
          "200": { description: "Deleted — averageRating recalculated" },
          "401": { description: "Not the owner" },
          "404": { description: "Not found" }
        }
      }
    },
    "/comments/{id}/report": {
      put: {
        tags: ["Comments"],
        summary: "Report a comment as inappropriate",
        operationId: "reportComment",
        security: [{ bearerAuth: [] }],
        parameters: [{ name: "id", in: "path", required: true, schema: { type: "string" } }],
        responses: {
          "200": { description: "reportCount incremented, status set to 'reported'", content: { "application/json": { schema: { allOf: [{ $ref: "#/components/schemas/SuccessResponse" }, { properties: { data: { $ref: "#/components/schemas/Comment" } } }] } } } },
          "404": { description: "Not found" }
        }
      }
    },

    // ─── REACTIONS ───────────────────────────────────────────────────────────
    "/comments/{commentId}/reactions": {
      get: {
        tags: ["Reactions"],
        summary: "Get all active reactions for a comment",
        operationId: "getReactionsByComment",
        parameters: [{ name: "commentId", in: "path", required: true, schema: { type: "string" } }],
        responses: {
          "200": {
            description: "List of reactions",
            content: { "application/json": { schema: { allOf: [{ $ref: "#/components/schemas/ListResponse" }, { properties: { data: { type: "array", items: { $ref: "#/components/schemas/Reaction" } } } }] } } }
          },
          "500": { description: "Server error" }
        }
      }
    },
    "/comments/{commentId}/reactions/toggle": {
      put: {
        tags: ["Reactions"],
        summary: "Toggle a reaction on a comment (add if absent, remove if present)",
        operationId: "toggleReaction",
        security: [{ bearerAuth: [] }],
        parameters: [{ name: "commentId", in: "path", required: true, schema: { type: "string" } }],
        requestBody: {
          required: true,
          content: {
            "application/json": {
              schema: { $ref: "#/components/schemas/ReactionInput" },
              examples: {
                defaultEmoji: { summary: "Default emoji", value: { emojiType: "default", emojiValue: "👍" } },
                customEmoji:  { summary: "Custom emoji", value: { emojiType: "custom", emojiValue: "my-emoji", customEmoji: "663f1a2b3c4d5e6f7a8b9c11" } }
              }
            }
          }
        },
        responses: {
          "200": { description: "Reaction removed", content: { "application/json": { schema: { type: "object", properties: { success: { type: "boolean" }, action: { type: "string", example: "removed" }, data: { type: "object" } } } } } },
          "201": { description: "Reaction added", content: { "application/json": { schema: { type: "object", properties: { success: { type: "boolean" }, action: { type: "string", example: "added" }, data: { $ref: "#/components/schemas/Reaction" } } } } } },
          "400": { description: "Missing fields / inactive custom emoji" },
          "404": { description: "Comment not found" }
        }
      }
    },

    // ─── CUSTOM EMOJIS ───────────────────────────────────────────────────────
    "/custom-emojis": {
      post: {
        tags: ["CustomEmojis"],
        summary: "Upload a new custom emoji image (multipart/form-data)",
        operationId: "uploadCustomEmoji",
        security: [{ bearerAuth: [] }],
        requestBody: {
          required: true,
          content: {
            "multipart/form-data": {
              schema: {
                type: "object",
                required: ["name","image"],
                properties: {
                  name:  { type: "string", maxLength: 50, example: "my-cool-emoji" },
                  image: { type: "string", format: "binary", description: "Image file (JPEG, PNG, etc.)" }
                }
              }
            }
          }
        },
        responses: {
          "201": { description: "Emoji uploaded and stored in Cloudinary", content: { "application/json": { schema: { allOf: [{ $ref: "#/components/schemas/SuccessResponse" }, { properties: { data: { $ref: "#/components/schemas/CustomEmoji" } } }] } } } },
          "400": { description: "No file uploaded" },
          "500": { description: "Cloudinary upload error" }
        }
      }
    },
    "/custom-emojis/me": {
      get: {
        tags: ["CustomEmojis"],
        summary: "Get all custom emojis created by the current user",
        operationId: "getMyCustomEmojis",
        security: [{ bearerAuth: [] }],
        responses: {
          "200": { description: "Your custom emojis", content: { "application/json": { schema: { allOf: [{ $ref: "#/components/schemas/ListResponse" }, { properties: { data: { type: "array", items: { $ref: "#/components/schemas/CustomEmoji" } } } }] } } } },
          "500": { description: "Server error" }
        }
      }
    },
    "/custom-emojis/{id}": {
      delete: {
        tags: ["CustomEmojis"],
        summary: "Delete a custom emoji (owner or admin) — also deletes from Cloudinary",
        operationId: "deleteCustomEmoji",
        security: [{ bearerAuth: [] }],
        parameters: [{ name: "id", in: "path", required: true, schema: { type: "string" } }],
        responses: {
          "200": { description: "Deleted from DB and Cloudinary" },
          "401": { description: "Not the owner" },
          "404": { description: "Emoji not found" },
          "500": { description: "Server error" }
        }
      }
    }

  }
};

window.onload = function() {
  SwaggerUIBundle({
    spec,
    dom_id: '#swagger-ui',
    presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
    layout: "StandaloneLayout",
    deepLinking: true,
    displayOperationId: false,
    defaultModelsExpandDepth: 1,
    defaultModelExpandDepth: 2,
    docExpansion: "list",
    filter: true,
    tagsSorter: "alpha"
  });
};
</script>
</body>
</html>
